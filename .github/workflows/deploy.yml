# Build and publish Vite app to GitHub Pages (publishes ./dist)
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create CNAME (if CUSTOM_DOMAIN provided)
        if: env.CUSTOM_DOMAIN != ''
        run: echo "${{ env.CUSTOM_DOMAIN }}" > ./dist/CNAME
        env:
          CUSTOM_DOMAIN: ${{ secrets.PAGES_CUSTOM_DOMAIN || '' }}

      - name: Upload artifact (dist)
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
